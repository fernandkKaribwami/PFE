name: frontend
description: "Réseau Social USMBA - PFE"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  lottie: ^2.6.0
  photo_view: ^0.14.0
  http: ^1.1.0
  socket_io_client: ^2.0.3
  connectivity_plus: ^4.0.2
  shared_preferences: ^2.2.0
  cached_network_image: ^3.2.3
  flutter_cache_manager: ^3.3.1
  image_picker: ^1.0.4
  file_picker: ^8.1.2
  video_player: ^2.7.2
  google_sign_in: ^6.1.5
  google_sign_in_web: ^0.12.4+4
  intl: ^0.18.1
  provider: ^6.0.5
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1
  build_runner: ^2.4.6
  riverpod_generator: ^2.3.2

flutter:
  uses-material-design: true
  # Les assets sont retirés pour éviter les erreurs de dossier manquant
